<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhóm 1</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
scroll-behavior:smooth;
}

body{
background:linear-gradient(135deg,#d4fc79,#b8f2e6);
overflow-x:hidden;
}

nav{
position:fixed;
top:0;
width:100%;
background:white;
display:flex;
justify-content:center;
gap:40px;
padding:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

nav a{
font-weight:bold;
cursor:pointer;
}

section{
padding:120px 20px 60px;
text-align:center;
}

h1{
font-size:45px;
margin-bottom:20px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
max-width:1100px;
margin:auto;
}

/* CARD */
.card{
perspective:1000px;
cursor:pointer;
}

.card-inner{
position:relative;
width:100%;
height:250px;
transition:transform 0.6s;
transform-style:preserve-3d;
}

.card.flipped .card-inner{
transform:rotateY(180deg);
}

.card-front,.card-back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
background:white;
border-radius:20px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
padding:15px;
}

.card-back{
transform:rotateY(180deg);
}

.avatar{
width:100px;
height:100px;
border-radius:50%;
background:yellow;
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
margin-bottom:10px;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0);}
}

/* PETALS */
.petal{
position:fixed;
top:-20px;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
to{transform:translateY(100vh) rotate(360deg);opacity:0;}
}

/* GAME */
#game{display:none;}

#gameArea{
height:300px;
background:white;
border-radius:20px;
margin-top:20px;
position:relative;
overflow:hidden;
}

.banana{
position:absolute;
font-size:30px;
cursor:pointer;
animation:fallBanana 2s linear forwards;
}

@keyframes fallBanana{
from{top:-40px;}
to{top:300px;}
}

button{
margin-top:10px;
padding:8px 20px;
border:none;
border-radius:20px;
background:#2ecc71;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<nav>
<a href="#home">Trang chủ</a>
<a href="#members">Thành viên</a>
<a onclick="toggleGame()">Mini Game</a>
</nav>

<section id="home">
<h1>Xin chào đây là trang web của Nhóm 1 💛</h1>
<p>Chúng mình luôn đoàn kết và phát triển mỗi ngày.</p>
</section>

<section id="members">
<h2>Thành viên nhóm</h2>

<div class="container">

<script>
const members = [
{name:"Yến Nhi",quote:"Tự tin là chìa khóa thành công 🌸"},
{name:"Tuyết Trinh",quote:"Sáng tạo không giới hạn 💡"},
{name:"Khánh An",quote:"Luôn nỗ lực hết mình 🎨"},
{name:"Ngọc Khánh",quote:"Kiên trì sẽ tạo khác biệt 📚"},
{name:"Thành Nhân",quote:"Không bỏ cuộc 🚀"},
{name:"Anh Minh",quote:"Đoàn kết là sức mạnh 💪"},
{name:"Hoàng Long",quote:"Dám nghĩ dám làm 🔥"},
{name:"Đăng Khoa",quote:"Bình tĩnh để thành công 🎯"}
];

document.write(members.map(m=>`
<div class="card" onclick="flipCard(this)">
<div class="card-inner">
<div class="card-front">
<div class="avatar">👁️</div>
<h3>${m.name}</h3>
</div>
<div class="card-back">
<p>${m.quote}</p>
</div>
</div>
</div>
`).join(""));
</script>

</div>
</section>

<section id="game">
<h2>Mini Game 🍌</h2>
<div id="gameArea"></div>
<div>Điểm: <span id="score">0</span></div>
<button onclick="startGame()">Bắt đầu</button>
</section>

<script>

function flipCard(card){
card.classList.toggle("flipped");
}

function toggleGame(){
const g=document.getElementById("game");
g.style.display = g.style.display==="block"?"none":"block";
}

setInterval(()=>{
const petal=document.createElement("div");
petal.className="petal";
petal.innerText="🌸";
petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=5+Math.random()*5+"s";
document.body.appendChild(petal);
setTimeout(()=>petal.remove(),10000);
},500);

let score=0;

function startGame(){
score=0;
document.getElementById("score").innerText=score;
setInterval(()=>{
const banana=document.createElement("div");
banana.className="banana";
banana.innerText="🍌";
banana.style.left=Math.random()*90+"%";
banana.onclick=function(){
score++;
document.getElementById("score").innerText=score;
banana.remove();
};
document.getElementById("gameArea").appendChild(banana);
setTimeout(()=>banana.remove(),2000);
},1000);
}

</script>

</body>
</html>
